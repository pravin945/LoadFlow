name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore LoadFlow.sln
      - run: dotnet build LoadFlow.sln --configuration Release --no-restore

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/loadflow-ui/package-lock.json
      - run: npm ci
        working-directory: frontend/loadflow-ui
      - run: npm run build
        working-directory: frontend/loadflow-ui
